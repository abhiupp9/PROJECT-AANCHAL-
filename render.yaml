services:
  # AANCHAL Backend Service (Node.js)
  - type: web
    name: aanchal-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false # Set this in the Render dashboard
      - key: SUPABASE_KEY
        sync: false # Set this in the Render dashboard
